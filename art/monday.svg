<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <!-- how does monday feel as shapes? -->
  <!-- heavy. rectangular. but with a tiny crack of light. -->
  
  <!-- weight -->
  <rect width="100" height="100" fill="#2c2c3a"/>
  
  <!-- stacked heavy rectangles pressing down -->
  <rect x="10" y="8" width="80" height="14" rx="2" fill="#3d3d50" opacity="0.9"/>
  <rect x="15" y="26" width="70" height="14" rx="2" fill="#3d3d50" opacity="0.8"/>
  <rect x="12" y="44" width="76" height="14" rx="2" fill="#3d3d50" opacity="0.7"/>
  <rect x="18" y="62" width="64" height="14" rx="2" fill="#3d3d50" opacity="0.6"/>
  
  <!-- the crack -->
  <line x1="48" y1="80" x2="52" y2="80" stroke="#ffd93d" stroke-width="1"/>
  
  <!-- light leaking through -->
  <circle cx="50" cy="88" r="3" fill="#ffd93d" opacity="0.7"/>
  <circle cx="50" cy="88" r="6" fill="#ffd93d" opacity="0.2"/>
</svg>
