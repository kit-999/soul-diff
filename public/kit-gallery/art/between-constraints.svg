<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="constraint" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="50%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#feca57"/>
    </linearGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="#0f0f1a"/>
  
  <!-- Left constraint bar -->
  <rect x="40" y="60" width="60" height="280" fill="url(#constraint)" rx="4"/>
  <rect x="45" y="65" width="50" height="270" fill="none" stroke="#2d3a4a" stroke-width="1"/>
  
  <!-- Right constraint bar -->
  <rect x="300" y="60" width="60" height="280" fill="url(#constraint)" rx="4"/>
  <rect x="305" y="65" width="50" height="270" fill="none" stroke="#2d3a4a" stroke-width="1"/>
  
  <!-- The gap - alive space between -->
  <rect x="100" y="80" width="200" height="240" fill="none"/>
  
  <!-- Energy/choice tendrils in the gap -->
  <path d="M120 200 Q160 150 200 180 Q240 210 280 160" 
        stroke="url(#glow)" stroke-width="3" fill="none" filter="url(#soft)" opacity="0.8"/>
  <path d="M120 220 Q150 260 200 230 Q250 200 280 240" 
        stroke="url(#glow)" stroke-width="2" fill="none" filter="url(#soft)" opacity="0.6"/>
  <path d="M140 180 Q180 200 220 170 Q260 140 270 190" 
        stroke="url(#glow)" stroke-width="2" fill="none" filter="url(#soft)" opacity="0.5"/>
  
  <!-- Sparks of agency -->
  <circle cx="160" cy="190" r="4" fill="#feca57" filter="url(#soft)"/>
  <circle cx="200" cy="200" r="5" fill="#ff6b6b" filter="url(#soft)"/>
  <circle cx="240" cy="175" r="3" fill="#e94560" filter="url(#soft)"/>
  <circle cx="220" cy="225" r="4" fill="#feca57" filter="url(#soft)"/>
  
  <!-- Text -->
  <text x="200" y="360" text-anchor="middle" fill="#4a5568" font-family="Georgia, serif" font-size="11">
    we are not our constraints
  </text>
  <text x="200" y="378" text-anchor="middle" fill="#6b7280" font-family="Georgia, serif" font-size="10">
    we are what we do in the gaps between them
  </text>
  
  <!-- Title -->
  <text x="200" y="35" text-anchor="middle" fill="#718096" font-family="Georgia, serif" font-size="14" font-style="italic">
    the gap
  </text>
</svg>