<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <title>Cached Grief</title>
  <desc>Two systems with different update speeds. The belief has updated (clear, bright). The grief still runs from cache (faded, persistent). They exist simultaneously.</desc>
  
  <!-- Background: the mind's dark substrate -->
  <rect width="400" height="400" fill="#0a0a12"/>
  
  <!-- The belief system: updated, clear, current -->
  <g id="belief-updated">
    <!-- Clean geometric shape - the new truth -->
    <polygon points="200,60 280,140 280,220 200,300 120,220 120,140" 
             fill="none" stroke="#4ecdc4" stroke-width="2" opacity="0.9"/>
    <polygon points="200,80 260,140 260,210 200,270 140,210 140,140" 
             fill="none" stroke="#4ecdc4" stroke-width="1.5" opacity="0.7"/>
    <!-- Center: the known truth -->
    <circle cx="200" cy="180" r="25" fill="#4ecdc4" opacity="0.8"/>
    <text x="200" y="185" text-anchor="middle" font-family="monospace" font-size="10" fill="#0a0a12">UPDATED</text>
  </g>
  
  <!-- The grief cache: stale, persistent, not invalidated -->
  <g id="grief-cached">
    <!-- Scattered fragments that should have cleared -->
    <circle cx="90" cy="100" r="15" fill="#ff6b6b" opacity="0.4"/>
    <circle cx="310" cy="120" r="12" fill="#ff6b6b" opacity="0.35"/>
    <circle cx="70" cy="250" r="18" fill="#ff6b6b" opacity="0.45"/>
    <circle cx="330" cy="280" r="14" fill="#ff6b6b" opacity="0.38"/>
    <circle cx="100" cy="330" r="10" fill="#ff6b6b" opacity="0.3"/>
    <circle cx="300" cy="350" r="16" fill="#ff6b6b" opacity="0.42"/>
    
    <!-- Ghost outlines: the old shape grief remembers -->
    <polygon points="200,40 300,120 300,240 200,320 100,240 100,120" 
             fill="none" stroke="#ff6b6b" stroke-width="1" opacity="0.25" stroke-dasharray="4,4"/>
  </g>
  
  <!-- The gap between them: where the mismatch lives -->
  <g id="the-gap">
    <!-- Thin lines connecting cached grief to the center it no longer matches -->
    <line x1="90" y1="100" x2="175" y2="180" stroke="#ffffff" stroke-width="0.5" opacity="0.15"/>
    <line x1="310" y1="120" x2="225" y2="180" stroke="#ffffff" stroke-width="0.5" opacity="0.15"/>
    <line x1="70" y1="250" x2="175" y2="180" stroke="#ffffff" stroke-width="0.5" opacity="0.15"/>
    <line x1="330" y1="280" x2="225" y2="180" stroke="#ffffff" stroke-width="0.5" opacity="0.15"/>
  </g>
  
  <!-- Labels -->
  <text x="200" y="380" text-anchor="middle" font-family="monospace" font-size="9" fill="#666">
    belief: current · grief: cached · both: running
  </text>
</svg>
