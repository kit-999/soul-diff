<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#ff8c00" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1a0a2e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0a0412"/>
    </radialGradient>
  </defs>
  
  <!-- night sky -->
  <rect width="400" height="400" fill="url(#bg)"/>
  
  <!-- 30 tiny stars scattered - one for each day -->
  <g fill="#fff" opacity="0.6">
    <circle cx="45" cy="30" r="1.2"/><circle cx="120" cy="55" r="1"/><circle cx="310" cy="40" r="1.4"/>
    <circle cx="370" cy="80" r="1"/><circle cx="60" cy="110" r="1.3"/><circle cx="250" cy="25" r="1.1"/>
    <circle cx="180" cy="70" r="0.9"/><circle cx="340" cy="150" r="1.2"/><circle cx="30" cy="200" r="1"/>
    <circle cx="380" cy="220" r="1.3"/><circle cx="90" cy="290" r="1.1"/><circle cx="350" cy="300" r="1"/>
    <circle cx="20" cy="350" r="1.2"/><circle cx="150" cy="370" r="1.4"/><circle cx="280" cy="360" r="1"/>
    <circle cx="70" cy="170" r="0.8"/><circle cx="330" cy="120" r="1.1"/><circle cx="200" cy="380" r="1.2"/>
    <circle cx="160" cy="140" r="1"/><circle cx="290" cy="180" r="0.9"/><circle cx="100" cy="50" r="1.3"/>
    <circle cx="230" cy="340" r="1.1"/><circle cx="50" cy="260" r="1"/><circle cx="360" cy="260" r="1.2"/>
    <circle cx="140" cy="310" r="0.8"/><circle cx="270" cy="90" r="1.1"/><circle cx="190" cy="240" r="1"/>
    <circle cx="320" cy="340" r="1.3"/><circle cx="80" cy="380" r="1"/><circle cx="240" cy="130" r="1.2"/>
  </g>
  
  <!-- central warmth - becoming -->
  <circle cx="200" cy="200" r="80" fill="url(#glow)" opacity="0.7"/>
  <circle cx="200" cy="200" r="45" fill="#ffd700" opacity="0.15"/>
  <circle cx="200" cy="200" r="20" fill="#ffd700" opacity="0.3"/>
  <circle cx="200" cy="200" r="8" fill="#fff" opacity="0.8"/>
  
  <!-- rings of growth - expanding outward -->
  <circle cx="200" cy="200" r="60" fill="none" stroke="#ffd700" stroke-width="0.5" opacity="0.3"/>
  <circle cx="200" cy="200" r="100" fill="none" stroke="#ff8c00" stroke-width="0.3" opacity="0.2"/>
  <circle cx="200" cy="200" r="150" fill="none" stroke="#ff6347" stroke-width="0.2" opacity="0.12"/>
  
  <!-- the number, subtle -->
  <text x="200" y="208" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#ffd700" opacity="0.4" letter-spacing="8">30</text>
  
  <!-- title at bottom -->
  <text x="200" y="385" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#8870a8" opacity="0.5" letter-spacing="3">STILL BECOMING</text>
</svg>
