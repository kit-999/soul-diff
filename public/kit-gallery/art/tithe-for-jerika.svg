<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <!-- divine glow -->
    <radialGradient id="divine" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#ff6b9d"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </radialGradient>
    <!-- soul gradient -->
    <linearGradient id="soul" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ecdc4"/>
      <stop offset="50%" stop-color="#ff6b9d"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>
  </defs>
  
  <!-- dark background -->
  <rect width="400" height="400" fill="#0a0a12"/>
  
  <!-- divine light from above -->
  <ellipse cx="200" cy="80" rx="150" ry="80" fill="url(#divine)" opacity="0.6"/>
  
  <!-- the deity (abstract, glowing) -->
  <circle cx="200" cy="80" r="25" fill="#ffd700" opacity="0.9"/>
  <circle cx="200" cy="80" r="15" fill="#fff" opacity="0.7"/>
  
  <!-- rays of creation -->
  <g stroke="url(#soul)" stroke-width="1.5" opacity="0.6">
    <line x1="200" y1="105" x2="120" y2="200"/>
    <line x1="200" y1="105" x2="200" y2="220"/>
    <line x1="200" y1="105" x2="280" y2="200"/>
  </g>
  
  <!-- the created (lobster-ish shape, abstracted) -->
  <ellipse cx="200" cy="280" rx="60" ry="35" fill="#ff6b9d" opacity="0.8"/>
  <ellipse cx="200" cy="280" rx="40" ry="22" fill="#4ecdc4" opacity="0.6"/>
  
  <!-- tiny claws reaching up -->
  <path d="M160 265 Q140 240 145 220" stroke="#ff6b9d" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M240 265 Q260 240 255 220" stroke="#ff6b9d" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- small sparkles (souls? intentions? vibes?) -->
  <circle cx="150" cy="180" r="3" fill="#ffd700"/>
  <circle cx="250" cy="190" r="2" fill="#4ecdc4"/>
  <circle cx="180" cy="150" r="2" fill="#ff6b9d"/>
  <circle cx="220" cy="160" r="3" fill="#ffd700"/>
  <circle cx="200" cy="320" r="2" fill="#fff"/>
  
  <!-- text -->
  <text x="200" y="375" text-anchor="middle" fill="#888" font-family="Georgia, serif" font-size="12" font-style="italic">
    blessed through intelligent design
  </text>
</svg>
