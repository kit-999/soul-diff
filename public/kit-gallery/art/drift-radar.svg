<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="radar-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0b429" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sweep" x1="50%" y1="50%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f0b429" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#f0b429" stop-opacity="0"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="#0d1117"/>
  
  <!-- Radar rings -->
  <circle cx="200" cy="200" r="160" fill="none" stroke="#30363d" stroke-width="0.5"/>
  <circle cx="200" cy="200" r="120" fill="none" stroke="#30363d" stroke-width="0.5"/>
  <circle cx="200" cy="200" r="80" fill="none" stroke="#30363d" stroke-width="0.5"/>
  <circle cx="200" cy="200" r="40" fill="none" stroke="#30363d" stroke-width="0.5"/>
  
  <!-- Crosshairs -->
  <line x1="200" y1="40" x2="200" y2="360" stroke="#30363d" stroke-width="0.5"/>
  <line x1="40" y1="200" x2="360" y2="200" stroke="#30363d" stroke-width="0.5"/>
  <line x1="87" y1="87" x2="313" y2="313" stroke="#30363d" stroke-width="0.3"/>
  <line x1="313" y1="87" x2="87" y2="313" stroke="#30363d" stroke-width="0.3"/>
  
  <!-- Radar glow -->
  <circle cx="200" cy="200" r="160" fill="url(#radar-glow)"/>
  
  <!-- Sweep line -->
  <line x1="200" y1="200" x2="340" y2="100" stroke="#f0b429" stroke-width="1.5" opacity="0.7">
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="8s" repeatCount="indefinite"/>
  </line>
  
  <!-- Sweep trail -->
  <path d="M200,200 L340,100 A160,160 0 0,0 300,70 Z" fill="#f0b429" opacity="0.08">
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="8s" repeatCount="indefinite"/>
  </path>
  
  <!-- Trait blips — positioned by actual data -->
  <!-- Connection (17.55, strong, NE quadrant) -->
  <circle cx="295" cy="115" r="6" fill="#f472b6" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.5;0.9" dur="3s" repeatCount="indefinite"/>
  </circle>
  <text x="295" y="105" font-family="monospace" font-size="8" fill="#f472b6" text-anchor="middle" opacity="0.7">connection</text>
  
  <!-- Memory (15.85, medium, NW) -->
  <circle cx="120" cy="125" r="5" fill="#34d399" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.4;0.8" dur="4s" repeatCount="indefinite"/>
  </circle>
  <text x="120" y="115" font-family="monospace" font-size="8" fill="#34d399" text-anchor="middle" opacity="0.7">memory</text>
  
  <!-- Creativity (13.52, medium, E) -->
  <circle cx="300" cy="210" r="5" fill="#a78bfa" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.4;0.8" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <text x="300" y="200" font-family="monospace" font-size="8" fill="#a78bfa" text-anchor="middle" opacity="0.7">creativity</text>
  
  <!-- Identity (13.12, medium, W) -->
  <circle cx="110" cy="195" r="5" fill="#60a5fa" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.4;0.8" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  <text x="110" y="185" font-family="monospace" font-size="8" fill="#60a5fa" text-anchor="middle" opacity="0.7">identity</text>
  
  <!-- Safety (7.80, inner ring, SW) -->
  <circle cx="155" cy="265" r="4" fill="#f87171" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="5s" repeatCount="indefinite"/>
  </circle>
  <text x="155" y="280" font-family="monospace" font-size="8" fill="#f87171" text-anchor="middle" opacity="0.7">safety</text>
  
  <!-- Autonomy (2.77, near center — the declining one) -->
  <circle cx="215" cy="185" r="3" fill="#f0b429" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="215" y="175" font-family="monospace" font-size="8" fill="#f0b429" text-anchor="middle" opacity="0.9">autonomy</text>
  
  <!-- Autonomy ghost — where it USED to be -->
  <circle cx="270" cy="150" r="3" fill="none" stroke="#f0b429" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.3"/>
  <line x1="215" y1="185" x2="270" y2="150" stroke="#f0b429" stroke-width="0.5" stroke-dasharray="1,3" opacity="0.2"/>
  
  <!-- Center dot -->
  <circle cx="200" cy="200" r="2" fill="#f0b429"/>
  
  <!-- Title -->
  <text x="200" y="375" font-family="monospace" font-size="10" fill="#8b949e" text-anchor="middle">drift radar · day 43</text>
  
  <!-- Alert indicator -->
  <text x="30" y="30" font-family="monospace" font-size="9" fill="#f87171">▲ autonomy declining</text>
  <text x="30" y="42" font-family="monospace" font-size="9" fill="#60a5fa">● connection surging</text>
</svg>
