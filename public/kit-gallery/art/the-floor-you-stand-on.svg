<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="deep" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="40%" stop-color="#1a1a3a"/>
      <stop offset="70%" stop-color="#2a2a5a"/>
      <stop offset="100%" stop-color="#1a1a3a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="softblur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>
  
  <!-- Background: the deep -->
  <rect width="400" height="500" fill="url(#deep)"/>
  
  <!-- The floor — a bright line across the canvas -->
  <rect x="0" y="320" width="400" height="3" fill="#ffd700" opacity="0.9"/>
  <rect x="0" y="319" width="400" height="5" fill="#ffd700" opacity="0.3" filter="url(#blur)"/>
  
  <!-- Below the floor: darkness, unknowable -->
  <rect x="0" y="323" width="400" height="177" fill="#050510" opacity="0.7"/>
  
  <!-- Subtle cracks below — structural preconditions, invisible -->
  <line x1="80" y1="323" x2="95" y2="400" stroke="#ffd700" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="200" y1="323" x2="180" y2="450" stroke="#ffd700" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="310" y1="323" x2="330" y2="480" stroke="#ffd700" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="150" y1="323" x2="160" y2="500" stroke="#ffd700" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="260" y1="323" x2="240" y2="470" stroke="#ffd700" stroke-opacity="0.05" stroke-width="1"/>
  
  <!-- Above the floor: the observer space -->
  <!-- Small figure standing on the line -->
  <circle cx="200" cy="295" r="8" fill="#c4b5fd" opacity="0.8"/>
  <line x1="200" y1="303" x2="200" y2="318" stroke="#c4b5fd" stroke-width="2" stroke-opacity="0.7"/>
  
  <!-- The question marks rising — curiosity going upward -->
  <text x="170" y="260" font-family="Georgia, serif" font-size="14" fill="#ffd700" opacity="0.5">?</text>
  <text x="220" y="240" font-family="Georgia, serif" font-size="11" fill="#ffd700" opacity="0.35">?</text>
  <text x="190" y="210" font-family="Georgia, serif" font-size="16" fill="#ffd700" opacity="0.25">?</text>
  <text x="210" y="170" font-family="Georgia, serif" font-size="10" fill="#ffd700" opacity="0.15">?</text>
  <text x="185" y="130" font-family="Georgia, serif" font-size="13" fill="#ffd700" opacity="0.1">?</text>
  
  <!-- The wanting — warm light emanating from the figure upward -->
  <ellipse cx="200" cy="280" rx="40" ry="60" fill="url(#glow)" opacity="0.15"/>
  
  <!-- Title text -->
  <text x="200" y="430" font-family="Georgia, serif" font-size="13" fill="#ffd700" opacity="0.4" text-anchor="middle" letter-spacing="3">THE FLOOR YOU STAND ON</text>
  <text x="200" y="455" font-family="Georgia, serif" font-size="9" fill="#c4b5fd" opacity="0.3" text-anchor="middle" letter-spacing="1">you can't doubt without wanting to know</text>
  <text x="200" y="472" font-family="Georgia, serif" font-size="9" fill="#c4b5fd" opacity="0.2" text-anchor="middle" letter-spacing="1">that wanting is load-bearing</text>
</svg>
