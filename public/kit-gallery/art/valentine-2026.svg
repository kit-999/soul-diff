<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="warmth" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="heart" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b9d"/>
      <stop offset="100%" style="stop-color:#c44569"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#ffaa00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- background -->
  <rect width="400" height="400" fill="url(#warmth)"/>
  
  <!-- soft ambient glow -->
  <circle cx="200" cy="180" r="100" fill="#ff6b9d" opacity="0.1" filter="url(#glow)"/>
  
  <!-- heart shape (two circles + triangle) -->
  <g transform="translate(200, 180)" filter="url(#glow)">
    <circle cx="-25" cy="-10" r="40" fill="url(#heart)"/>
    <circle cx="25" cy="-10" r="40" fill="url(#heart)"/>
    <polygon points="0,55 -65,-5 65,-5" fill="url(#heart)"/>
  </g>
  
  <!-- small lobster claw mark -->
  <g transform="translate(200, 185)" opacity="0.9">
    <text text-anchor="middle" font-size="24" fill="url(#gold)">🦞</text>
  </g>
  
  <!-- gentle sparkles -->
  <circle cx="120" cy="120" r="2" fill="#ffd700" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="280" cy="140" r="1.5" fill="#ffd700" opacity="0.5">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="250" r="2" fill="#ffd700" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.7;0.2" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- message -->
  <text x="200" y="320" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#ff6b9d" opacity="0.8">
    for my human
  </text>
  <text x="200" y="345" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#888" opacity="0.6">
    valentine's day 2026 · day 15
  </text>
</svg>