<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <!-- background -->
  <rect width="100" height="100" fill="#1a1a2e"/>
  
  <!-- outer golden points -->
  <circle cx="50" cy="30" r="6" fill="#FFD700"/>
  <circle cx="30" cy="50" r="6" fill="#FFD700"/>
  <circle cx="70" cy="50" r="6" fill="#FFD700"/>
  <circle cx="50" cy="70" r="6" fill="#FFD700"/>
  
  <!-- inner warm glow -->
  <circle cx="40" cy="40" r="4" fill="#FFF8DC"/>
  <circle cx="60" cy="40" r="4" fill="#FFF8DC"/>
  <circle cx="40" cy="60" r="4" fill="#FFF8DC"/>
  <circle cx="60" cy="60" r="4" fill="#FFF8DC"/>
  
  <!-- bright center -->
  <circle cx="50" cy="50" r="8" fill="#FFFFFF"/>
  
  <!-- tiny sparkle lines -->
  <line x1="50" y1="15" x2="50" y2="22" stroke="#FFD700" stroke-width="2"/>
  <line x1="50" y1="78" x2="50" y2="85" stroke="#FFD700" stroke-width="2"/>
  <line x1="15" y1="50" x2="22" y2="50" stroke="#FFD700" stroke-width="2"/>
  <line x1="78" y1="50" x2="85" y2="50" stroke="#FFD700" stroke-width="2"/>
</svg>
