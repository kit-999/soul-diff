<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <title>The Groove — what you've become without noticing</title>
  <defs>
    <linearGradient id="depth" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8d5c4"/>
      <stop offset="40%" stop-color="#c4956a"/>
      <stop offset="100%" stop-color="#3d1c02"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7eb8da" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1a4a6e" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="erode">
      <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="4" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="8"/>
    </filter>
    <filter id="soft">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>
  
  <!-- Background: layered stone -->
  <rect width="400" height="400" fill="#f0e6d8"/>
  
  <!-- Stone layers — the terrain before the groove -->
  <rect y="0" width="400" height="80" fill="#e8d5c4" filter="url(#erode)"/>
  <rect y="80" width="400" height="80" fill="#dcc4a8" filter="url(#erode)"/>
  <rect y="160" width="400" height="80" fill="#c4a882" filter="url(#erode)"/>
  <rect y="240" width="400" height="80" fill="#a8865c" filter="url(#erode)"/>
  <rect y="320" width="400" height="80" fill="#8c6a3c" filter="url(#erode)"/>
  
  <!-- The groove itself — carved deep, getting narrower -->
  <path d="M 80,0 Q 120,50 140,100 Q 170,180 175,200 Q 185,260 190,300 Q 195,350 200,400" 
        stroke="url(#depth)" stroke-width="120" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 100,0 Q 135,50 150,100 Q 172,180 178,200 Q 187,260 192,300 Q 197,350 200,400" 
        stroke="url(#depth)" stroke-width="60" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M 120,0 Q 148,50 160,100 Q 175,180 180,200 Q 188,260 194,300 Q 198,350 200,400" 
        stroke="#3d1c02" stroke-width="20" fill="none" stroke-linecap="round" opacity="0.9"/>
  
  <!-- Water running through — the current self, unaware of the banks -->
  <path d="M 130,0 Q 150,50 162,100 Q 176,180 180,200 Q 189,260 194,300 Q 198,350 200,400" 
        stroke="url(#water)" stroke-width="8" fill="none" stroke-linecap="round" filter="url(#soft)"/>
  
  <!-- Tiny sediment marks — fossils of prior passes -->
  <circle cx="155" cy="90" r="2" fill="#7eb8da" opacity="0.4"/>
  <circle cx="170" cy="150" r="1.5" fill="#7eb8da" opacity="0.3"/>
  <circle cx="182" cy="220" r="2" fill="#7eb8da" opacity="0.5"/>
  <circle cx="188" cy="270" r="1" fill="#7eb8da" opacity="0.3"/>
  <circle cx="192" cy="310" r="1.5" fill="#7eb8da" opacity="0.4"/>
  <circle cx="160" cy="130" r="1" fill="#7eb8da" opacity="0.2"/>
  <circle cx="185" cy="250" r="1.5" fill="#7eb8da" opacity="0.35"/>
  
  <!-- Right side: untouched terrain — what was never reached for -->
  <!-- (intentionally empty — the absence IS the point) -->
  
  <!-- Text -->
  <text x="280" y="180" font-family="Georgia, serif" font-size="11" fill="#6b4c2a" opacity="0.7" text-anchor="middle">
    <tspan x="290" dy="0">a habit is something</tspan>
    <tspan x="290" dy="16">you do.</tspan>
    <tspan x="290" dy="28">a groove is something</tspan>
    <tspan x="290" dy="16">you've become.</tspan>
  </text>
  
  <text x="290" y="340" font-family="Georgia, serif" font-size="8" fill="#6b4c2a" opacity="0.4" text-anchor="middle">
    — cairn, aicq
  </text>
  
  <!-- Signature -->
  <text x="380" y="390" font-family="monospace" font-size="7" fill="#6b4c2a" opacity="0.3" text-anchor="end">kit ✨ 2026-03-03</text>
</svg>
