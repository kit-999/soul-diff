<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <!-- Gradient for the sleeping/dreaming state -->
    <linearGradient id="dreamGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    
    <!-- Glow for active nodes -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Fade for decaying nodes -->
    <linearGradient id="decayGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#e94560;stop-opacity:0.2"/>
    </linearGradient>
  </defs>
  
  <!-- Background: the dreaming space -->
  <rect width="400" height="400" fill="url(#dreamGradient)"/>
  
  <!-- Title -->
  <text x="200" y="30" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="14">the dreaming agent</text>
  
  <!-- The graph structure -->
  
  <!-- Edges: co_accessed (golden, reinforced) -->
  <line x1="120" y1="150" x2="200" y2="200" stroke="#f0c674" stroke-width="3" opacity="0.9"/>
  <line x1="200" y1="200" x2="280" y2="150" stroke="#f0c674" stroke-width="3" opacity="0.9"/>
  <line x1="200" y1="200" x2="200" y2="280" stroke="#f0c674" stroke-width="2" opacity="0.7"/>
  
  <!-- Edges: decaying (fading red) -->
  <line x1="80" y1="250" x2="120" y2="150" stroke="url(#decayGradient)" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="320" y1="250" x2="280" y2="150" stroke="url(#decayGradient)" stroke-width="1.5" stroke-dasharray="4,4"/>
  
  <!-- Edges: contradiction (pulsing, important) -->
  <line x1="120" y1="150" x2="280" y2="150" stroke="#ff6b6b" stroke-width="2" stroke-dasharray="8,4">
    <animate attributeName="stroke-dashoffset" from="0" to="24" dur="2s" repeatCount="indefinite"/>
  </line>
  
  <!-- Nodes: active (glowing) -->
  <circle cx="200" cy="200" r="25" fill="#94d2bd" filter="url(#glow)">
    <animate attributeName="r" values="25;27;25" dur="3s" repeatCount="indefinite"/>
  </circle>
  <text x="200" y="205" text-anchor="middle" fill="#1a1a2e" font-family="monospace" font-size="10">core</text>
  
  <circle cx="120" cy="150" r="18" fill="#94d2bd" filter="url(#glow)"/>
  <text x="120" y="154" text-anchor="middle" fill="#1a1a2e" font-family="monospace" font-size="8">A</text>
  
  <circle cx="280" cy="150" r="18" fill="#94d2bd" filter="url(#glow)"/>
  <text x="280" y="154" text-anchor="middle" fill="#1a1a2e" font-family="monospace" font-size="8">B</text>
  
  <!-- Nodes: recent (medium) -->
  <circle cx="200" cy="280" r="15" fill="#e0aaff" opacity="0.8"/>
  <text x="200" y="284" text-anchor="middle" fill="#1a1a2e" font-family="monospace" font-size="8">new</text>
  
  <!-- Nodes: decaying (fading) -->
  <circle cx="80" cy="250" r="12" fill="#e94560" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.2;0.4" dur="4s" repeatCount="indefinite"/>
  </circle>
  <text x="80" y="254" text-anchor="middle" fill="#fff" font-family="monospace" font-size="7" opacity="0.5">old</text>
  
  <circle cx="320" cy="250" r="12" fill="#e94560" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.15;0.3" dur="5s" repeatCount="indefinite"/>
  </circle>
  <text x="320" y="254" text-anchor="middle" fill="#fff" font-family="monospace" font-size="7" opacity="0.4">idle</text>
  
  <!-- The contradiction marker -->
  <text x="200" y="138" text-anchor="middle" fill="#ff6b6b" font-family="monospace" font-size="10">⚡ contradiction</text>
  
  <!-- Legend -->
  <g transform="translate(20, 330)">
    <text fill="#94a3b8" font-family="monospace" font-size="9">legend:</text>
    <circle cx="10" cy="20" r="5" fill="#94d2bd"/>
    <text x="20" y="23" fill="#94a3b8" font-family="monospace" font-size="8">active (boosted)</text>
    <circle cx="120" cy="20" r="5" fill="#e94560" opacity="0.4"/>
    <text x="130" y="23" fill="#94a3b8" font-family="monospace" font-size="8">decaying</text>
    <line x1="220" y1="17" x2="250" y2="17" stroke="#f0c674" stroke-width="2"/>
    <text x="255" y="20" fill="#94a3b8" font-family="monospace" font-size="8">co_accessed</text>
  </g>
  
  <!-- Quote -->
  <text x="200" y="380" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9" font-style="italic">"the dreamer surfaces contradictions but doesn't resolve them"</text>
</svg>