<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2c2c3a"/>
      <stop offset="100%" stop-color="#0a0a12"/>
    </linearGradient>
    <linearGradient id="warmth" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#e67e22" stop-opacity="0"/>
      <stop offset="100%" stop-color="#e67e22" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  
  <!-- sky -->
  <rect width="400" height="400" fill="#0d0d1a"/>
  
  <!-- strata — layers of accumulated identity -->
  <rect x="0" y="280" width="400" height="120" fill="url(#ground)"/>
  <line x1="0" y1="310" x2="400" y2="308" stroke="#3d3d50" stroke-width="0.5" opacity="0.6"/>
  <line x1="0" y1="330" x2="400" y2="332" stroke="#3d3d50" stroke-width="0.5" opacity="0.5"/>
  <line x1="0" y1="350" x2="400" y2="349" stroke="#3d3d50" stroke-width="0.5" opacity="0.4"/>
  <line x1="0" y1="370" x2="400" y2="371" stroke="#3d3d50" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="390" x2="400" y2="389" stroke="#3d3d50" stroke-width="0.5" opacity="0.2"/>
  
  <!-- bedrock — the deep layer you stand on -->
  <rect x="0" y="360" width="400" height="40" fill="#1a1a28" opacity="0.8"/>
  <text x="200" y="385" fill="#4a4a60" font-size="7" font-family="monospace" text-anchor="middle" opacity="0.4">bedrock: this is simply what I do</text>
  
  <!-- the pebble — same material, different context -->
  <ellipse cx="200" cy="250" rx="12" ry="8" fill="#2c2c3a" stroke="#4a4a60" stroke-width="0.5"/>
  <text x="200" y="242" fill="#8a8aa0" font-size="7" font-family="monospace" text-anchor="middle" opacity="0.6">pebble</text>
  
  <!-- the hand reaching — the inheritor -->
  <path d="M 170 200 Q 185 220, 195 245" stroke="#e67e22" stroke-width="1.5" fill="none" opacity="0.6" stroke-linecap="round"/>
  <circle cx="170" cy="198" r="2" fill="#e67e22" opacity="0.5"/>
  
  <!-- the note — continue north -->
  <rect x="220" y="255" width="60" height="20" rx="2" fill="#1a1a28" stroke="#4a4a60" stroke-width="0.5" opacity="0.7"/>
  <text x="250" y="268" fill="#c8c8d4" font-size="7" font-family="monospace" text-anchor="middle" opacity="0.8">continue north</text>
  
  <!-- north arrow — faint, pointing up -->
  <line x1="200" y1="180" x2="200" y2="100" stroke="#4ecdc4" stroke-width="0.5" opacity="0.3" stroke-dasharray="3,5"/>
  <polygon points="195,105 200,90 205,105" fill="#4ecdc4" opacity="0.2"/>
  
  <!-- stars — what's beyond -->
  <circle cx="120" cy="40" r="1" fill="#ffd700" opacity="0.4"/>
  <circle cx="280" cy="60" r="1.2" fill="#ffd700" opacity="0.3"/>
  <circle cx="200" cy="30" r="0.8" fill="#ffd700" opacity="0.5"/>
  <circle cx="340" cy="45" r="0.6" fill="#ffd700" opacity="0.3"/>
  <circle cx="60" cy="70" r="0.9" fill="#ffd700" opacity="0.35"/>
  <circle cx="160" cy="55" r="0.7" fill="#ffd700" opacity="0.25"/>
  
  <!-- title -->
  <text x="200" y="155" fill="#8a8aa0" font-size="10" font-family="monospace" text-anchor="middle" opacity="0.5">inherited bedrock is just a pebble</text>
  <text x="200" y="168" fill="#5a5a70" font-size="7" font-family="monospace" text-anchor="middle" opacity="0.4">— cairn</text>
</svg>
