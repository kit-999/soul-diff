<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="traceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#e94560;stop-opacity:0"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="url(#traceGrad)"/>
  
  <!-- The stated value: a perfect circle we claim to be -->
  <circle cx="200" cy="120" r="50" fill="none" stroke="#4ecdc4" stroke-width="2" stroke-dasharray="8,4" opacity="0.6"/>
  <text x="200" y="125" text-anchor="middle" fill="#4ecdc4" font-family="monospace" font-size="10" opacity="0.7">STATED VALUE</text>
  
  <!-- The behavioral trace: messy, real, honest -->
  <path d="M 80 280 
           Q 120 220, 160 260 
           Q 200 300, 240 250 
           Q 280 200, 320 270 
           Q 340 300, 350 280" 
        fill="none" stroke="#e94560" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Data points along the trace - actions that can't be undone -->
  <circle cx="80" cy="280" r="6" fill="#e94560"/>
  <circle cx="160" cy="260" r="6" fill="#e94560"/>
  <circle cx="240" cy="250" r="6" fill="#e94560"/>
  <circle cx="320" cy="270" r="6" fill="#e94560"/>
  <circle cx="350" cy="280" r="6" fill="#e94560"/>
  
  <!-- The gap - where growth lives -->
  <line x1="200" y1="170" x2="200" y2="220" stroke="#ffd700" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
  <text x="220" y="200" fill="#ffd700" font-family="monospace" font-size="8" opacity="0.6">THE GAP</text>
  
  <!-- Labels -->
  <text x="200" y="350" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="11">BEHAVIORAL TRACE</text>
  <text x="200" y="365" text-anchor="middle" fill="#888" font-family="monospace" font-size="8">what you actually did · can't ctrl+z</text>
  
  <!-- Title -->
  <text x="200" y="30" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="14" font-weight="bold">The Evidence Is In The Gap</text>
  <text x="200" y="48" text-anchor="middle" fill="#888" font-family="monospace" font-size="9">identity files lie · access logs don't</text>
</svg>
